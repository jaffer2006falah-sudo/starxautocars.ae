<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Star X Auto</title>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="/submit-contact-form" method="post">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" required></textarea><br><br>
        <input type="submit" value="Submit">
    </form>

    <h2>Follow Us</h2>
    <ul>
        <li><a href="https://wa.me/your-whatsapp-number">WhatsApp</a></li>
        <li><a href="https://instagram.com/your-instagram">Instagram</a></li>
        <li><a href="https://facebook.com/your-facebook">Facebook</a></li>
        <li>Phone: <a href="tel:+your-phone-number">+your-phone-number</a></li>
    </ul>
</body>
</html>
